<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&amp;ID Tool — Phase 0 (block level)</title>
<style>
  :root{
    --ink:#1c1b19; --ink-soft:#5a5954; --ink-faint:#8b8a84;
    --paper:#ffffff; --panel:#f5f6f7; --panel-2:#eef0f1;
    --rule:#d7d8d6; --rule-strong:#b4b5b2;
    --stamp:#b23a2e; --asbuilt:#1f5f8b;
    --stamp-tint:#f7ecea; --blue-tint:#eaf1f6; --green-tint:#eef6ef; --green:#2f6b3a;
    --grid:#e9eaea;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:var(--sans); color:var(--ink); background:var(--paper);
    display:flex; flex-direction:column; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- Toolbar ---- */
  .bar{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:9px 14px; border-bottom:2px solid var(--ink); background:var(--paper);
    z-index:5;
  }
  .brand{
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:#fff; background:var(--ink); padding:5px 10px; border-radius:3px; margin-right:6px;
  }
  .brand b{ color:#fff; }
  .brand .rev{ color:var(--stamp); background:#fff; padding:1px 5px; border-radius:6px; margin-left:7px; font-weight:700; }
  .btn{
    font-family:var(--sans); font-size:13px; font-weight:600; color:var(--ink);
    background:var(--panel); border:1px solid var(--rule-strong); border-radius:4px;
    padding:6px 11px; cursor:pointer; line-height:1; white-space:nowrap;
  }
  .btn:hover{ background:var(--panel-2); }
  .btn:focus-visible{ outline:2px solid var(--asbuilt); outline-offset:1px; }
  .btn.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .btn.accent{ border-color:#cdb3ae; }
  .sep{ width:1px; height:22px; background:var(--rule); margin:0 4px; }
  .grow{ flex:1 1 auto; }
  .status{ font-family:var(--mono); font-size:11px; color:var(--ink-faint); white-space:nowrap; }
  .status b{ color:var(--ink); }
  .zoom{ font-family:var(--mono); font-size:11px; color:var(--ink-soft); min-width:54px; text-align:right; }

  /* ---- Hint strip ---- */
  .hint{
    font-family:var(--mono); font-size:11px; color:var(--ink-soft);
    background:var(--panel); border-bottom:1px solid var(--rule);
    padding:5px 14px; letter-spacing:.01em;
  }
  .hint .k{ color:var(--stamp); }

  /* ---- Canvas ---- */
  .stage{ position:relative; flex:1 1 auto; overflow:hidden; background:var(--paper); }
  svg#canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  svg#canvas.mode-add{ cursor:crosshair; }
  svg#canvas.mode-connect{ cursor:cell; }
  svg#canvas.panning{ cursor:grabbing; }

  .blk rect{ fill:#fff; stroke:var(--ink); stroke-width:1.5; }
  .blk.sel rect{ stroke:var(--stamp); stroke-width:2; }
  .blk.src rect{ stroke:var(--asbuilt); stroke-width:2; stroke-dasharray:5 3; }
  .blk text{ font-family:var(--sans); font-size:13px; font-weight:600; fill:var(--ink); }
  .port{ fill:var(--paper); stroke:var(--ink-soft); stroke-width:1.2; }
  .port.in{ stroke:var(--asbuilt); }
  .port.out{ stroke:var(--stamp); }
  .conn{ fill:none; stroke:var(--ink); stroke-width:1.5; }
  .conn-label{ font-family:var(--mono); font-size:10px; fill:var(--ink-soft); }

  /* ---- Self-test panel ---- */
  .tests{
    position:absolute; right:14px; top:14px; width:min(380px, calc(100% - 28px));
    background:var(--paper); border:1px solid var(--rule-strong); border-radius:6px;
    box-shadow:0 8px 30px rgba(0,0,0,.12); z-index:10; display:none; overflow:hidden;
  }
  .tests.show{ display:block; }
  .tests header{
    display:flex; align-items:center; gap:10px; padding:10px 13px;
    border-bottom:1px solid var(--rule); background:var(--ink); color:#fff;
  }
  .tests header .ttl{ font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; }
  .tests header .sum{ font-family:var(--mono); font-size:12px; font-weight:700; margin-left:auto; }
  .tests header .sum.pass{ color:#9be3a8; }
  .tests header .sum.fail{ color:#f1a9a0; }
  .tests header .x{ cursor:pointer; color:#fff; opacity:.7; font-size:16px; line-height:1; background:none; border:none; }
  .tests header .x:hover{ opacity:1; }
  .tests ul{ list-style:none; margin:0; padding:6px 0; max-height:50vh; overflow:auto; }
  .tests li{ display:grid; grid-template-columns:auto 1fr; gap:9px; padding:7px 14px; font-size:12.5px; line-height:1.4; border-bottom:1px solid var(--panel-2); }
  .tests li:last-child{ border-bottom:none; }
  .tests li .mk{ font-family:var(--mono); font-weight:700; }
  .tests li.ok .mk{ color:var(--green); }
  .tests li.no .mk{ color:var(--stamp); }
  .tests li .msg{ display:block; font-family:var(--mono); font-size:11px; color:var(--stamp); margin-top:3px; }

  .empty{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    text-align:center; color:var(--ink-faint); font-family:var(--mono); font-size:12px;
    letter-spacing:.04em; pointer-events:none; line-height:1.7;
  }
  .empty .big{ font-family:var(--sans); font-size:15px; color:var(--ink-soft); font-weight:600; letter-spacing:0; margin-bottom:6px; }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

  <div class="bar">
    <span class="brand"><b>P&amp;ID</b> · Phase 0<span class="rev">v0.1</span></span>
    <button class="btn" id="btnAdd">+ Block</button>
    <button class="btn" id="btnConnect">Connect</button>
    <span class="sep"></span>
    <button class="btn" id="btnSave">Save JSON</button>
    <button class="btn" id="btnLoad">Load JSON</button>
    <input type="file" id="fileIn" accept="application/json,.json" hidden>
    <span class="sep"></span>
    <button class="btn accent" id="btnTest">Self-test</button>
    <span class="grow"></span>
    <span class="status" id="status">ready</span>
    <span class="sep"></span>
    <span class="zoom" id="zoom">100%</span>
    <button class="btn" id="btnFit" title="Reset view">Reset view</button>
  </div>

  <div class="hint" id="hint"></div>

  <div class="stage">
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
          <path d="M24 0H0V24" fill="none" stroke="#e9eaea" stroke-width="1"/>
        </pattern>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0 0L10 5L0 10z" fill="#1c1b19"/>
        </marker>
      </defs>
      <g id="viewport">
        <rect id="bg" x="-5000" y="-5000" width="10000" height="10000" fill="url(#grid)"/>
        <g id="layerConn"></g>
        <g id="layerComp"></g>
      </g>
    </svg>

    <div class="empty" id="empty">
      <div class="big">Empty sheet</div>
      Click <span style="color:var(--ink)">+ Block</span> then click the sheet to place one.<br>
      Drag to move · scroll to zoom · drag blank space to pan.
    </div>

    <div class="tests" id="testPanel">
      <header>
        <span class="ttl">Self-test</span>
        <span class="sum" id="testSum">—</span>
        <button class="x" id="testClose" aria-label="Close">✕</button>
      </header>
      <ul id="testList"></ul>
    </div>
  </div>

<script>
"use strict";

//#MODELCORE_START — pure data model + self-tests. No DOM access in this block.
const Model = (function () {

  function uuid() {
    try { if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID(); } catch (e) {}
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      const r = Math.random() * 16 | 0, v = c === "x" ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  // Default generic block: two process ports, centred origin (matches PID-SCHEMA §04).
  function defaultPorts() {
    return [
      { id: "in",  name: "In",  kind: "process", offset: { dx: -60, dy: 0 }, compatibleKinds: ["process"], attributes: {} },
      { id: "out", name: "Out", kind: "process", offset: { dx:  60, dy: 0 }, compatibleKinds: ["process"], attributes: {} }
    ];
  }

  function createModel() {
    return {
      schemaVersion: "0.1",
      project: { id: "prj-new", name: "Untitled", taggingScheme: "KKS", defaultUnits: "mm" },
      document: { titleBlock: { drawingNumber: "", title: "" }, revisions: [], notes: [] },
      sheets: [{ id: "sh-1", number: "S-1", size: "A1" }],
      components: [],
      connections: [],
      typicalDefs: []
    };
  }

  function createComponent(opts) {
    opts = opts || {};
    return {
      id: uuid(),
      typeId: opts.typeId || "block.generic",
      sheetId: opts.sheetId || "sh-1",
      geometry: { x: opts.x || 0, y: opts.y || 0, rotation: 0, mirrored: false },
      tag: opts.tag || null,
      domain: { label: opts.label || "Block" },
      ports: defaultPorts()
    };
  }

  function createConnection(opts) {
    return {
      id: uuid(),
      from: { componentId: opts.fromC, portId: opts.fromP || "out" },
      to:   { componentId: opts.toC,   portId: opts.toP   || "in" },
      kind: "process",
      direction: opts.direction || "fromTo",
      line: opts.line || null
    };
  }

  function addComponent(m, c) { m.components.push(c); return c; }
  function addConnection(m, x) { m.connections.push(x); return x; }
  function getComponent(m, id) { return m.components.find(function (c) { return c.id === id; }); }
  function getPort(c, portId) { return c && c.ports.find(function (p) { return p.id === portId; }); }

  // Project a port to world coordinates from model geometry (rotation/mirror deferred — Phase 0).
  function portWorld(c, portId) {
    const p = getPort(c, portId);
    if (!p) return null;
    return { x: c.geometry.x + p.offset.dx, y: c.geometry.y + p.offset.dy };
  }

  function serialise(m) { return JSON.stringify(m, null, 2); }

  function parse(json) {
    const m = JSON.parse(json);
    if (!m || typeof m !== "object") throw new Error("not an object");
    if (!m.schemaVersion) throw new Error("missing schemaVersion");
    if (!Array.isArray(m.components) || !Array.isArray(m.connections)) throw new Error("missing collections");
    return m;
  }

  // Objective integrity checks (subset for Phase 0). Returns an array of problem strings.
  function checkInvariants(m) {
    const errs = [];
    if (!m.schemaVersion) errs.push("missing schemaVersion");
    const ids = m.components.map(function (c) { return c.id; });
    if (new Set(ids).size !== ids.length) errs.push("duplicate component id");
    m.connections.forEach(function (x) {
      const cf = getComponent(m, x.from.componentId);
      const ct = getComponent(m, x.to.componentId);
      if (!cf || !getPort(cf, x.from.portId)) errs.push("dangling 'from' on connection " + x.id);
      if (!ct || !getPort(ct, x.to.portId)) errs.push("dangling 'to' on connection " + x.id);
    });
    return errs;
  }

  return {
    uuid, createModel, createComponent, createConnection,
    addComponent, addConnection, getComponent, getPort, portWorld,
    serialise, parse, checkInvariants
  };
})();

// The worked example from PID-SCHEMA §07 — used by the round-trip self-test.
const EXAMPLE_07 = JSON.stringify({
  schemaVersion: "0.1",
  project: { id: "prj-pinjarra-u1", name: "Pinjarra U1 — CW", taggingScheme: "KKS", defaultUnits: "mm" },
  document: { titleBlock: { drawingNumber: "10427-SXO00-XP-024", title: "Cooling Water System" }, revisions: [], notes: [] },
  sheets: [{ id: "sh-024", number: "XP-024", size: "A1" }],
  components: [
    { id: "c-pump-01", typeId: "equipment.pump.centrifugal", sheetId: "sh-024",
      geometry: { x: 200, y: 300, rotation: 0, mirrored: false },
      tag: { scheme: "KKS", value: "P1PCC10AP010" },
      domain: { service: "Cooling water pump 1", ratedFlow: "946 m3/h" },
      ports: [ { id: "suct", kind: "process", offset: { dx: -20, dy: 0 } },
               { id: "disch", kind: "process", offset: { dx: 20, dy: 0 } } ] },
    { id: "c-valve-01", typeId: "valve.gate", sheetId: "sh-024",
      geometry: { x: 420, y: 300, rotation: 0, mirrored: false },
      tag: { scheme: "KKS", value: "P1PCC10AA001" },
      domain: { valveType: "gate", endConnection: "flanged" },
      ports: [ { id: "in", kind: "process", offset: { dx: -12, dy: 0 } },
               { id: "out", kind: "process", offset: { dx: 12, dy: 0 } } ] }
  ],
  connections: [
    { id: "x-01",
      from: { componentId: "c-pump-01", portId: "disch" },
      to:   { componentId: "c-valve-01", portId: "in" },
      kind: "process", direction: "fromTo",
      line: { number: "300-CWS-024", nominalSize: "DN300", service: "CWS" } }
  ],
  typicalDefs: []
}, null, 2);

function runSelfTests() {
  const results = [];
  function test(name, fn) {
    try { fn(); results.push({ name: name, ok: true }); }
    catch (e) { results.push({ name: name, ok: false, msg: e.message }); }
  }
  function assert(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); }
  const norm = function (j) { return JSON.stringify(JSON.parse(j)); }; // formatting-independent compare

  test("§07 example round-trips unchanged", function () {
    const m = Model.parse(EXAMPLE_07);
    const out = Model.serialise(m);
    assert(norm(out) === norm(EXAMPLE_07), "round-trip differs from source");
  });

  test("built model round-trips losslessly", function () {
    const m = Model.createModel();
    const a = Model.addComponent(m, Model.createComponent({ x: 200, y: 300, label: "Pump" }));
    const b = Model.addComponent(m, Model.createComponent({ x: 420, y: 300, label: "Valve" }));
    Model.addConnection(m, Model.createConnection({ fromC: a.id, toC: b.id }));
    const s = Model.serialise(m);
    const again = Model.serialise(Model.parse(s));
    assert(again === s, "second serialise differs");
  });

  test("component ids are unique across many creations", function () {
    const m = Model.createModel();
    for (let i = 0; i < 100; i++) Model.addComponent(m, Model.createComponent({ x: i, y: i }));
    const ids = m.components.map(function (c) { return c.id; });
    assert(new Set(ids).size === ids.length, "duplicate id generated");
  });

  test("portWorld projects from geometry + offset", function () {
    const m = Model.createModel();
    const c = Model.addComponent(m, Model.createComponent({ x: 100, y: 50 }));
    const w = Model.portWorld(c, "out");
    assert(w.x === 160 && w.y === 50, "got " + JSON.stringify(w));
  });

  test("checkInvariants passes a valid model", function () {
    const m = Model.createModel();
    const a = Model.addComponent(m, Model.createComponent({ x: 0, y: 0 }));
    const b = Model.addComponent(m, Model.createComponent({ x: 1, y: 1 }));
    Model.addConnection(m, Model.createConnection({ fromC: a.id, toC: b.id }));
    assert(Model.checkInvariants(m).length === 0, "valid model reported errors");
  });

  test("checkInvariants flags a dangling connection", function () {
    const m = Model.createModel();
    const a = Model.addComponent(m, Model.createComponent({ x: 0, y: 0 }));
    m.connections.push({ id: "bad", from: { componentId: a.id, portId: "out" },
                         to: { componentId: "missing", portId: "in" }, kind: "process" });
    assert(Model.checkInvariants(m).length > 0, "dangling not detected");
  });

  return results;
}
//#MODELCORE_END

/* ============================================================
   VIEW / CONTROLLER — DOM + SVG. Renders purely FROM the model.
   ============================================================ */
(function () {
  if (typeof document === "undefined") return; // headless guard

  const BLOCK_W = 120, BLOCK_H = 60;
  let model = Model.createModel();
  let view = { tx: 0, ty: 0, s: 1 };
  let mode = "select";            // select | add | connect
  let selectedId = null;          // selected block (select mode)
  let connectSrc = null;          // source block id (connect mode)

  const svg = document.getElementById("canvas");
  const viewport = document.getElementById("viewport");
  const layerComp = document.getElementById("layerComp");
  const layerConn = document.getElementById("layerConn");
  const elStatus = document.getElementById("status");
  const elZoom = document.getElementById("zoom");
  const elHint = document.getElementById("hint");
  const elEmpty = document.getElementById("empty");

  const SVGNS = "http://www.w3.org/2000/svg";
  function el(name, attrs) {
    const e = document.createElementNS(SVGNS, name);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  // ---- view transform ----
  function applyView() {
    viewport.setAttribute("transform", "translate(" + view.tx + "," + view.ty + ") scale(" + view.s + ")");
    elZoom.textContent = Math.round(view.s * 100) + "%";
  }
  function screenToModel(clientX, clientY) {
    const r = svg.getBoundingClientRect();
    return { x: (clientX - r.left - view.tx) / view.s, y: (clientY - r.top - view.ty) / view.s };
  }

  // ---- render (the projection) ----
  function render() {
    layerComp.textContent = "";
    layerConn.textContent = "";

    model.connections.forEach(function (x) {
      const cf = Model.getComponent(model, x.from.componentId);
      const ct = Model.getComponent(model, x.to.componentId);
      if (!cf || !ct) return;
      const a = Model.portWorld(cf, x.from.portId);
      const b = Model.portWorld(ct, x.to.portId);
      if (!a || !b) return;
      const path = el("path", { class: "conn", d: "M" + a.x + "," + a.y + " L" + b.x + "," + b.y });
      const dir = x.direction || "fromTo";
      if (dir === "fromTo" || dir === "bidirectional") path.setAttribute("marker-end", "url(#arrow)");
      if (dir === "toFrom" || dir === "bidirectional") path.setAttribute("marker-start", "url(#arrow)");
      layerConn.appendChild(path);
      if (x.line && x.line.number) {
        const t = el("text", { class: "conn-label", x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 - 5, "text-anchor": "middle" });
        t.textContent = x.line.number;
        layerConn.appendChild(t);
      }
    });

    model.components.forEach(function (c) {
      const g = el("g", { class: "blk" + (c.id === selectedId ? " sel" : "") + (c.id === connectSrc ? " src" : "") });
      g.dataset.id = c.id;
      g.appendChild(el("rect", { x: c.geometry.x - BLOCK_W / 2, y: c.geometry.y - BLOCK_H / 2, width: BLOCK_W, height: BLOCK_H, rx: 2 }));
      const label = el("text", { x: c.geometry.x, y: c.geometry.y + 4, "text-anchor": "middle" });
      label.textContent = c.domain.label || "Block";
      g.appendChild(label);
      c.ports.forEach(function (p) {
        g.appendChild(el("circle", { class: "port " + p.id, cx: c.geometry.x + p.offset.dx, cy: c.geometry.y + p.offset.dy, r: 4 }));
      });
      layerComp.appendChild(g);
    });

    elEmpty.style.display = model.components.length ? "none" : "block";
  }

  // ---- status / mode ----
  const HINTS = {
    select: "<span class='k'>SELECT</span> · drag a block to move · drag blank to pan · scroll to zoom · double-click a block to rename",
    add: "<span class='k'>ADD</span> · click the sheet to place a block · Esc to leave",
    connect: "<span class='k'>CONNECT</span> · click source block, then target · creates out → in · Esc to leave"
  };
  function setMode(m) {
    mode = m; connectSrc = null;
    document.getElementById("btnAdd").classList.toggle("on", m === "add");
    document.getElementById("btnConnect").classList.toggle("on", m === "connect");
    svg.classList.toggle("mode-add", m === "add");
    svg.classList.toggle("mode-connect", m === "connect");
    elHint.innerHTML = HINTS[m];
    render();
  }
  function status(msg) { elStatus.innerHTML = msg; }
  function counts() {
    status("<b>" + model.components.length + "</b> blocks · <b>" + model.connections.length + "</b> connections");
  }

  // ---- hit testing ----
  function blockAt(target) {
    let n = target;
    while (n && n !== svg) { if (n.classList && n.classList.contains("blk")) return n.dataset.id; n = n.parentNode; }
    return null;
  }

  // ---- pointer interaction ----
  let drag = null; // {type:'pan'|'move', ...}
  svg.addEventListener("pointerdown", function (ev) {
    const id = blockAt(ev.target);

    if (mode === "add") {
      const p = screenToModel(ev.clientX, ev.clientY);
      const c = Model.addComponent(model, Model.createComponent({ x: Math.round(p.x), y: Math.round(p.y), label: "Block " + (model.components.length + 1) }));
      selectedId = c.id; render(); counts();
      return;
    }

    if (mode === "connect") {
      if (!id) { connectSrc = null; render(); return; }
      if (!connectSrc) { connectSrc = id; render(); status("source set — pick target"); return; }
      if (connectSrc === id) { connectSrc = null; render(); status("same block — cancelled"); return; }
      Model.addConnection(model, Model.createConnection({ fromC: connectSrc, toC: id }));
      connectSrc = null; render(); counts();
      return;
    }

    // select mode
    if (id) {
      selectedId = id;
      const c = Model.getComponent(model, id);
      const p = screenToModel(ev.clientX, ev.clientY);
      drag = { type: "move", id: id, dx: c.geometry.x - p.x, dy: c.geometry.y - p.y };
      render();
    } else {
      selectedId = null;
      drag = { type: "pan", sx: ev.clientX, sy: ev.clientY, tx: view.tx, ty: view.ty };
      svg.classList.add("panning");
      render();
    }
    svg.setPointerCapture(ev.pointerId);
  });

  svg.addEventListener("pointermove", function (ev) {
    if (!drag) return;
    if (drag.type === "pan") {
      view.tx = drag.tx + (ev.clientX - drag.sx);
      view.ty = drag.ty + (ev.clientY - drag.sy);
      applyView();
    } else if (drag.type === "move") {
      const p = screenToModel(ev.clientX, ev.clientY);
      const c = Model.getComponent(model, drag.id);
      c.geometry.x = Math.round(p.x + drag.dx);
      c.geometry.y = Math.round(p.y + drag.dy);
      render();
    }
  });

  svg.addEventListener("pointerup", function (ev) {
    drag = null; svg.classList.remove("panning");
    try { svg.releasePointerCapture(ev.pointerId); } catch (e) {}
  });

  // double-click to rename (Phase 0 — simple prompt)
  svg.addEventListener("dblclick", function (ev) {
    const id = blockAt(ev.target);
    if (!id) return;
    const c = Model.getComponent(model, id);
    const name = window.prompt("Block label:", c.domain.label || "");
    if (name !== null) { c.domain.label = name; render(); }
  });

  // wheel zoom toward cursor
  svg.addEventListener("wheel", function (ev) {
    ev.preventDefault();
    const r = svg.getBoundingClientRect();
    const mx = ev.clientX - r.left, my = ev.clientY - r.top;
    const factor = ev.deltaY < 0 ? 1.1 : 1 / 1.1;
    const ns = Math.min(6, Math.max(0.15, view.s * factor));
    // keep the point under the cursor fixed
    view.tx = mx - (mx - view.tx) * (ns / view.s);
    view.ty = my - (my - view.ty) * (ns / view.s);
    view.s = ns;
    applyView();
  }, { passive: false });

  // keyboard: Esc to select mode, Delete to remove selected
  window.addEventListener("keydown", function (ev) {
    if (ev.key === "Escape") setMode("select");
    if ((ev.key === "Delete" || ev.key === "Backspace") && selectedId && mode === "select") {
      const tgt = document.activeElement;
      if (tgt && (tgt.tagName === "INPUT" || tgt.tagName === "TEXTAREA")) return;
      model.connections = model.connections.filter(function (x) {
        return x.from.componentId !== selectedId && x.to.componentId !== selectedId;
      });
      model.components = model.components.filter(function (c) { return c.id !== selectedId; });
      selectedId = null; render(); counts();
    }
  });

  // ---- toolbar ----
  document.getElementById("btnAdd").onclick = function () { setMode(mode === "add" ? "select" : "add"); };
  document.getElementById("btnConnect").onclick = function () { setMode(mode === "connect" ? "select" : "connect"); };
  document.getElementById("btnFit").onclick = function () { view = { tx: 0, ty: 0, s: 1 }; applyView(); };

  document.getElementById("btnSave").onclick = function () {
    const blob = new Blob([Model.serialise(model)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "pid-model.json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    status("saved pid-model.json");
  };

  document.getElementById("btnLoad").onclick = function () { document.getElementById("fileIn").click(); };
  document.getElementById("fileIn").onchange = function (ev) {
    const f = ev.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = function () {
      try {
        const loaded = Model.parse(reader.result);
        const errs = Model.checkInvariants(loaded);
        model = loaded; selectedId = null; connectSrc = null;
        render(); counts();
        if (errs.length) status("loaded with " + errs.length + " integrity warning(s)");
        else status("loaded " + f.name);
      } catch (e) {
        status("load failed: " + e.message);
      }
    };
    reader.readAsText(f);
    ev.target.value = "";
  };

  // ---- self-test panel ----
  function showTests() {
    const results = runSelfTests();
    const list = document.getElementById("testList");
    const sum = document.getElementById("testSum");
    list.textContent = "";
    let pass = 0;
    results.forEach(function (r) {
      if (r.ok) pass++;
      const li = document.createElement("li");
      li.className = r.ok ? "ok" : "no";
      li.innerHTML = "<span class='mk'>" + (r.ok ? "PASS" : "FAIL") + "</span>" +
        "<span>" + r.name + (r.ok ? "" : "<span class='msg'>" + (r.msg || "") + "</span>") + "</span>";
      list.appendChild(li);
    });
    const all = pass === results.length;
    sum.textContent = pass + "/" + results.length;
    sum.className = "sum " + (all ? "pass" : "fail");
    document.getElementById("testPanel").classList.add("show");
  }
  document.getElementById("btnTest").onclick = showTests;
  document.getElementById("testClose").onclick = function () {
    document.getElementById("testPanel").classList.remove("show");
  };

  // ---- boot ----
  applyView();
  setMode("select");
  counts();
  if (location.hash === "#selftest") showTests();
})();
</script>
</body>
</html>
